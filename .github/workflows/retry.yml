name: Oracle ARM Instance Retry
on:
  workflow_dispatch:
jobs:
  create-instance:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    steps:
      - name: Install OCI dependencies
        run: pip install oci
      - name: Check for existing instance and create if none found
        env:
          OCI_USER: ${{ secrets.OCI_USER }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_TENANCY: ${{ secrets.OCI_TENANCY }}
          OCI_KEY_CONTENT: ${{ secrets.OCI_KEY_CONTENT }}
          SUBNET_ID: ${{ secrets.SUBNET_ID }}
          IMAGE_ID: ${{ secrets.IMAGE_ID }}
          AVAILABILITY_DOMAIN: ${{ secrets.AVAILABILITY_DOMAIN }}
        run: |
          python3 - <<'EOF'
          import oci, os, sys, time
          config = {
            "user": os.environ["OCI_USER"],
            "fingerprint": os.environ["OCI_FINGERPRINT"],
            "tenancy": os.environ["OCI_TENANCY"],
            "region": "eu-paris-1",
            "key_content": os.environ["OCI_KEY_CONTENT"]
          }
          client = oci.core.ComputeClient(config)
          compartment_id = os.environ["OCI_TENANCY"]
          ad = os.environ.get("AVAILABILITY_DOMAIN", "Onva:EU-PARIS-1-AD-1")

          # --- Check for existing running/provisioning instances ---
          print("Checking for existing instances named 'labelwise-oracle-vm'...")
          instances = client.list_instances(compartment_id=compartment_id)
          for inst in instances.data:
            if (inst.display_name == "labelwise-oracle-vm" and
                inst.lifecycle_state not in ["TERMINATED", "TERMINATING"]):
              print(f"EXISTING INSTANCE FOUND: {inst.id} (state: {inst.lifecycle_state})")
              print("Skipping creation — instance already exists. Exiting.")
              sys.exit(0)

          print("No existing instance found. Starting creation loop...")
          attempt = 0
          start = time.time()
          max_seconds = 19800  # ~5.5 hours
          while (time.time() - start) < max_seconds:
            attempt += 1
            elapsed = int(time.time() - start)
            print(f"[Attempt {attempt} | {elapsed}s elapsed] Trying to create instance in {ad}...")
            details = oci.core.models.LaunchInstanceDetails(
              compartment_id=compartment_id,
              availability_domain=ad,
              display_name="labelwise-oracle-vm",
              shape="VM.Standard.A1.Flex",
              shape_config=oci.core.models.LaunchInstanceShapeConfigDetails(
                ocpus=4, memory_in_gbs=24
              ),
              source_details=oci.core.models.InstanceSourceViaImageDetails(
                source_type="image",
                image_id=os.environ["IMAGE_ID"]
              ),
              create_vnic_details=oci.core.models.CreateVnicDetails(
                subnet_id=os.environ["SUBNET_ID"],
                assign_public_ip=True
              )
            )
            try:
              result = client.launch_instance(details)
              print(f"SUCCESS! Instance OCID: {result.data.id}")
              print(f"Instance state: {result.data.lifecycle_state}")
              sys.exit(0)
            except oci.exceptions.ServiceError as e:
              msg = str(getattr(e, 'message', e))
              if "Out of host capacity" in msg or "out of capacity" in msg.lower():
                print(f" -> Out of capacity. Waiting 30s before retry...")
                time.sleep(30)
              elif "LimitExceeded" in msg:
                print(f" -> Limit exceeded — instance likely already exists: {msg}")
                sys.exit(0)
              else:
                print(f" -> Unexpected API error: {e}")
                time.sleep(30)
            except Exception as e:
              print(f" -> Error: {e}")
              time.sleep(30)
          print(f"Job time limit reached after {attempt} attempts.")
          sys.exit(0)
          EOF
